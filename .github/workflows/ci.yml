name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

jobs:
  quality:
    name: Lint, Type Check & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Type check
        run: pnpm turbo type-check
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      # CI_DATABASE_URL secret: optional — set to a PostgreSQL test DB URL for
      # any tests that need a live DB (e.g. rls-audit). If not set, service
      # tests that use createMockTx still pass because they mock the DB layer.
      - name: Run unit tests
        run: pnpm turbo run test
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          NODE_ENV: test
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: apps/api/coverage/
          retention-days: 7
