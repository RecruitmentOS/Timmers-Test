name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Type check
        run: pnpm turbo type-check

      - name: Unit tests
        run: pnpm turbo test

      - name: Install Playwright browsers
        run: pnpm --filter @recruitment-os/web exec playwright install chromium --with-deps

      - name: E2E tests
        run: pnpm --filter @recruitment-os/web test:e2e
        env:
          CI: true
