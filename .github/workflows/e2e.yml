name: E2E Tests

# Playwright runs on push to main and via manual dispatch only (not on every
# PR) to avoid burning Actions minutes on flaky E2E. Use workflow_dispatch to
# run against a PR branch before merging.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override E2E_BASE_URL (leave empty to auto-start dev server)"
        required: false
        default: ""

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: recruitment_os_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/recruitment_os_test
      NODE_ENV: test
      # API server config
      PORT: 3001
      FRONTEND_URL: http://localhost:3002
      JWT_SECRET: ci-e2e-jwt-secret-not-for-prod
      BETTER_AUTH_SECRET: ci-e2e-better-auth-secret-not-for-prod
      # Web server config (Next.js dev script listens on 3002 — see apps/web/package.json)
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Playwright
      E2E_PORT: 3002
      E2E_BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:3002' }}
      E2E_HAS_SEED: "1"
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @recruitment-os/web exec playwright install --with-deps chromium

      - name: Run database migrations
        run: pnpm --filter @recruitment-os/api exec tsx src/db/migrate.ts

      - name: Seed E2E test data
        run: pnpm --filter @recruitment-os/api exec tsx src/db/seed/index.ts --demo
        continue-on-error: true
        # continue-on-error: seed failures should not block E2E — specs guarded
        # by E2E_HAS_SEED env var will still run; unseeded tests stay fixme.

      - name: Start API server
        run: pnpm --filter @recruitment-os/api dev &

      - name: Wait for API to be ready
        run: npx wait-on http://localhost:3001/health --timeout 60000

      - name: Run Playwright E2E tests
        # Playwright's webServer config auto-starts `pnpm dev` for Next.js on
        # port 3002. Do NOT set E2E_SKIP_WEBSERVER here.
        run: pnpm turbo run test:e2e
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results/**/*.zip
          retention-days: 7
